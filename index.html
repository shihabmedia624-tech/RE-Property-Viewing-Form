<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Property Viewing | Shihab Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.5) !important;
        }
        label {
            color: rgba(255, 255, 255, 0.9) !important;
        }
        option {
            background: #1e293b;
            color: white;
        }
        /* Loading state for button */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl w-full glass-card rounded-3xl overflow-hidden">
        <div class="p-10 text-center border-b border-white/10">
            <h1 class="text-3xl font-semibold text-white tracking-tight">Schedule Your Viewing</h1>
            <p class="text-white/60 mt-2 text-sm">Experience your future home. Fill out the details below.</p>
        </div>

        <form id="viewingForm" class="p-10 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-1">Full Name *</label>
                    <input type="text" name="full_name" required placeholder="John Doe" class="w-full px-4 py-3 rounded-xl outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Email Address *</label>
                    <input type="email" name="email" required placeholder="john@example.com" class="w-full px-4 py-3 rounded-xl outline-none transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-1">Phone Number *</label>
                    <input type="tel" name="phone" required placeholder="+1 (555) 000-0000" class="w-full px-4 py-3 rounded-xl outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Property Address *</label>
                    <input type="text" name="property_address" required placeholder="123 Luxury Way, NY" class="w-full px-4 py-3 rounded-xl outline-none transition">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-1">Viewing Date (DD/MM/YYYY) *</label>
                    <input type="text" name="viewing_date" id="dateInput" required placeholder="31/12/2026" maxlength="10" class="w-full px-4 py-3 rounded-xl outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Viewing Time *</label>
                    <select name="viewing_time" required class="w-full px-4 py-3 rounded-xl outline-none transition">
                        <option value="" disabled selected>Select Time</option>
                        <option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option>
                        <option>12:00 PM</option><option>1:00 PM</option><option>2:00 PM</option>
                        <option>3:00 PM</option><option>4:00 PM</option><option>5:00 PM</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">How Did You Hear About Us?</label>
                <select name="referral_source" class="w-full px-4 py-3 rounded-xl outline-none transition">
                    <option>Google Search</option>
                    <option>Social Media</option>
                    <option>Referral</option>
                    <option>Advertisement</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Message (Optional)</label>
                <textarea name="message" rows="3" placeholder="Any specific details?" class="w-full px-4 py-3 rounded-xl outline-none transition"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-white text-slate-900 font-bold py-4 rounded-xl hover:bg-opacity-90 transform transition active:scale-[0.98] shadow-xl">
                Confirm Booking
            </button>

            <div id="successMessage" class="hidden text-center p-4 rounded-xl bg-green-500/20 border border-green-500/50">
                <p class="text-green-400 font-semibold">✅ Thank you for filling out the form! We will contact you shortly.</p>
            </div>
        </form>

        <div class="p-6 bg-black/20 text-center">
            <p class="text-[10px] text-white/40 uppercase tracking-widest font-semibold">Shihab Media Automation</p>
        </div>
    </div>

    <script>
        // 1. Date Masking Logic (DD/MM/YYYY)
        const dateInput = document.getElementById('dateInput');
        dateInput.addEventListener('input', function(e) {
            let v = this.value.replace(/\D/g, '');
            if (v.length > 2) v = v.slice(0, 2) + '/' + v.slice(2);
            if (v.length > 5) v = v.slice(0, 5) + '/' + v.slice(5, 9);
            this.value = v;
        });

        // 2. AJAX Submission Logic
        const form = document.getElementById('viewingForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Change button state
            submitBtn.textContent = 'Processing...';
            submitBtn.classList.add('loading');

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('https://shihabsakif2767.duckdns.org/webhook-test/b2027b04-048d-496e-aa5e-46f2183736d4', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // Hide button and show success
                    submitBtn.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                    form.reset();
                } else {
                    alert('Something went wrong. Please try again.');
                    submitBtn.textContent = 'Confirm Booking';
                    submitBtn.classList.remove('loading');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection error. Please check your internet.');
                submitBtn.textContent = 'Confirm Booking';
                submitBtn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
